<!DOCTYPE html>
<html>
    <head>
        <title>Design</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../vendor/bootstrap/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../vendor/bootstrap-icons/bootstrap-icons.min.css" />
        <style>
            .dropArea {
                height: 100%;
                color: #0f3c4b;
                background-color: #e3f2e1;
                transition:
                    outline-offset 0.2s ease-out,
                    outline-color 0.3s ease-in-out,
                    background-color 0.2s ease-out;
            }
            .dropArea.highlight {
                outline-offset: -4px;
                outline-color: #0f3c4b;
                background-color: #cff4fc !important;
            }
        </style>
    </head>
    <body class="bg-body-tertiary">
        <div class="container my-5">
            <h3>ENACT Table 1</h3>
            <hr class="mb-4" />
            <ul class="nav nav-pills mb-5" id="wizard-tab" role="tablist">
                <li class="nav-item flex-fill">
                    <button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#step1">Input Data</button>
                </li>
                <li class="nav-item flex-fill">
                    <button class="nav-link w-100 disabled" id="step2btn" data-bs-toggle="pill" data-bs-target="#step2">Table</button>
                </li>
            </ul>
            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="step1">
                    <div class="card border-secondary">
                        <div class="card-body">
                            <div class="row gy-5">
                                <!-- settings -->
                                <div class="col-12 text-bg-light p-2">
                                    <div class="d-flex justify-content-between">
                                        <div class="row g-2 align-items-center">
                                            <div class="col-auto">
                                                <label for="numOfCols" class="form-label m-0 fw-bold">Number of columns:</label>
                                            </div>
                                            <div class="col-auto">
                                                <select class="form-select" id="numOfCols" aria-label="Select number of columns">
                                                    <option value="1" selected="selected">1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- end of settings -->
                                <!-- table design -->
                                <div class="col-12">
                                    <div class="alert alert-danger p-2" id="dataErrorMsg" role="alert" style="display: none;">
                                        <i class="bi bi-exclamation-triangle"></i> Please provide the data file for the red-highlighted cells.
                                    </div>
                                    <form id="input_labels">
                                        <table class="table table-bordered w-100" id="tableInput">
                                            <caption class="caption-top text-black"><i class="bi bi-pencil"></i> Double click to edit label.</caption>
                                            <tbody>
                                                <tr>
                                                    <td></td>
                                                    <td class="text-center">
                                                        <label for="c1_label_input">
                                                            <span class="h6 fw-bold" id="c1_label">Column 1 <i class="bi bi-pencil"></i></span>
                                                            <input type="text" aria-label="Column 1 label" class="form-control" id="c1_label_input" name="c1_label_input" value="" required="required" style="display: none;" />
                                                        </label>
                                                    </td>
                                                </tr>
                                            </tbody>
                                            <tbody>
                                                <tr>
                                                    <td>
                                                        <label for="total_label_input">
                                                            <span class="h6 fw-bold" id="total_label">Total <i class="bi bi-pencil"></i></span>
                                                            <input type="text" aria-label="Label" class="form-control" id="total_label_input" name="total_label_input" value="" required="required" style="display: none;" />
                                                        </label>
                                                    </td>
                                                    <td class="border border-black border-2">
                                                        <div class="text-center align-middle p-4 dropArea" id="c1_total_droparea">
                                                            Drag &amp; Drop or
                                                            <input class="position-absolute invisible" id="c1_total_file" type="file" accept=".csv" />
                                                            <label class="btn btn-success" for="c1_total_file">Choose CSV File</label>
                                                            <div class="mt-3" style="width: fit-content; margin-inline: auto;">(Regular Query)</div>
                                                        </div>
                                                        <div id="c1_total_filename"></div>
                                                    </td>
                                                </tr>
                                            </tbody>
                                            <tbody>
                                                <tr>
                                                    <td>
                                                        <label for="demo_label_input">
                                                            <span class="h6 fw-bold" id="demo_label">Demographic Distribution By <i class="bi bi-pencil"></i></span>
                                                            <input type="text" aria-label="Demographics" class="form-control" id="demo_label_input" name="demo_label_input" value="" required="required" style="display: none;" />
                                                        </label>
                                                        <div class="row g-2 align-items-center mt-2 pb-5">
                                                            <div class="col-auto">
                                                                <label class="col-form-label fw-bold">Data Type:</label>
                                                            </div>
                                                            <div class="col-auto">
                                                                <div class="form-check form-check-inline">
                                                                    <input class="form-check-input" type="radio" name="datatype" id="demo_breakdown_query" value="breakdown" checked="checked" />
                                                                    <label class="form-check-label" for="demo_breakdown_query">Breakdown</label>
                                                                </div>
                                                                <div class="form-check form-check-inline">
                                                                    <input class="form-check-input" type="radio" name="datatype" id="demo_reg_query" value="query" />
                                                                    <label class="form-check-label" for="demo_reg_query">Query</label>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <ul class="list-group" id="demo_var_list">
                                                        </ul>
                                                    </td>
                                                    <td class="border border-black border-2">
                                                        <div class="text-center align-middle p-4 dropArea" id="c1_demo_droparea">
                                                            Drag &amp; Drop or
                                                            <input class="position-absolute invisible" id="c1_demo_file" type="file" accept=".csv" />
                                                            <label class="btn btn-success" for="c1_demo_file">Choose CSV File</label>
                                                            <div class="mt-3" style="width: fit-content; margin-inline: auto;">(<span class="query_type"></span> Query)</div>
                                                        </div>
                                                        <div id="c1_demo_filename"></div>
                                                        <ul class="list-group" id="c1_demo_var_list">
                                                        </ul>
                                                    </td>
                                                </tr>
                                            </tbody>
                                            <tbody>
                                                <tr>
                                                    <td>
                                                        <label for="comorb_label_input">
                                                            <span class="h6 fw-bold" id="comorb_label">Comorbidity <i class="bi bi-pencil"></i></span>
                                                            <input type="text" aria-label="Label" class="form-control" id="comorb_label_input" name="comorb_label_input" value="" required="required" style="display: none;" />
                                                        </label>
                                                    </td>
                                                    <td class="border border-black border-2">
                                                        <div class="text-center align-middle p-4 dropArea" id="c1_comorb_droparea">
                                                            Drag &amp; Drop or
                                                            <input class="position-absolute invisible" id="c1_comorb_file" type="file" accept=".csv" />
                                                            <label class="btn btn-success" for="c1_comorb_file">Choose CSV File</label>
                                                            <div class="mt-3" style="width: fit-content; margin-inline: auto;">(Breakdown Query)</div>
                                                        </div>
                                                        <div id="c1_comorb_filename"></div>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </form>
                                </div>
                                <!-- end of table design -->
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-0 col-4 mx-auto mt-5">
                        <button type="button" class="btn btn-primary" id="nextStep"><i class="bi bi-arrow-right"></i> Next</button>
                    </div>
                </div>
                <div class="tab-pane fade" id="step2">
                    <div class="card border-secondary">
                        <div class="card-body">
                            <div class="row gy-5">
                                <!-- settings -->
                                <div class="col-12 text-bg-light p-2">
                                    <div class="d-flex justify-content-between">
                                        <div class="row g-2 align-items-center">
                                            <div class="col-auto">
                                                <label for="selectPatientCounts" class="form-label mt-2">Select patient counts for <i>"10 patients or fewer"</i>:</label>
                                            </div>
                                            <div class="col-auto">
                                                <select class="form-select" id="selectPatientCounts" aria-label="Default select example">
                                                    <option value="0">0</option>
                                                    <option value="1">1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                    <option value="7">7</option>
                                                    <option value="8">8</option>
                                                    <option value="9">9</option>
                                                    <option value="10" selected="selected">10</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button type="button" id="exportData" class="btn btn-success float-end"><i class="bi bi-file-earmark-arrow-down"></i> Export Data</button>
                                    </div>
                                </div>
                                <!-- end of settings -->
                                <!-- table design -->
                                <div class="col-12">
                                    <table id="tableOne" class="table table-sm table-bordered border-secondary table-striped caption-top"></table>
                                </div>
                                <!-- end of table design -->
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-0 col-4 mx-auto mt-5">
                        <button type="button" class="btn btn-primary" id="prevStep"><i class="bi bi-arrow-left"></i> Back</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="../vendor/jquery/jquery-3.7.1.slim.min.js"></script>
        <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../vendor/jquery-validation/jquery.validate.min.js"></script>
        <script src="../vendor/papaparse/papaparse.min.js"></script>
        <script src="js/design.js"></script>
    </body>
</html>
